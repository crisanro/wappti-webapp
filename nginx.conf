server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip — reduce el peso de los archivos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Flutter SPA routing
    location / {
        try_files $uri $uri/ /index.html;

        # HTML — cache corto, Cloudflare siempre verifica si cambió
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Assets con hash en el nombre (Flutter los genera así)
    # Estos NUNCA cambian, se pueden cachear para siempre
    location ~* \.(js|css|woff2|png|jpg|gif|ico|svg|json)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # canvaskit — muy pesado, cachear agresivamente
    location /canvaskit/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
